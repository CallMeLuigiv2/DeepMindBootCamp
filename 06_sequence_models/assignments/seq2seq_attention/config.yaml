# Seq2Seq with Attention - Configuration

# Data
data:
  num_samples: 50000
  train_size: 40000
  val_size: 5000
  test_size: 5000
  random_seed: 42

# Model
model:
  embedding_dim: 64
  hidden_size: 128
  num_layers: 1
  attention_size: 128
  dropout: 0.1

# Training
training:
  batch_size: 128
  num_epochs: 30
  learning_rate: 0.001
  teacher_forcing_ratio: 0.5
  grad_clip_max_norm: 5.0
  optimizer: adam
  weight_decay: 0.0

# Beam Search
beam_search:
  beam_widths: [1, 3, 5, 10]
  max_len: 12
  length_norm_alpha: 0.6

# Logging
logging:
  log_interval: 100
  save_dir: checkpoints
  log_dir: logs
