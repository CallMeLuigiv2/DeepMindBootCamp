# Ensemble Competition -- Default Hyperparameters

data:
  dataset: "adult"  # Options: adult, spaceship_titanic, or path to CSV
  test_size: 0.2
  random_state: 42

cv:
  n_folds: 5
  stratified: true
  shuffle: true

models:
  decision_tree_scratch:
    max_depth: 10
    min_samples_split: 5
    criterion: "gini"  # gini or entropy

  decision_tree_sklearn:
    max_depth: 10
    min_samples_split: 5

  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 5
    max_features: "sqrt"

  gradient_boosting:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.1
    subsample: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

  logistic_regression:
    C: 1.0
    max_iter: 1000

hyperparameter_search:
  enabled: true
  n_iter: 50
  scoring: "f1_weighted"
  search_spaces:
    random_forest:
      n_estimators: [50, 100, 200, 300, 500]
      max_depth: [5, 10, 15, 20, null]
      min_samples_split: [2, 5, 10, 20]
      max_features: ["sqrt", "log2", 0.5]
    gradient_boosting:
      n_estimators: [50, 100, 200, 300, 500]
      max_depth: [3, 5, 7, 10]
      learning_rate: [0.01, 0.05, 0.1, 0.2]
      subsample: [0.6, 0.8, 1.0]
      reg_alpha: [0.0, 0.01, 0.1, 1.0]
      reg_lambda: [0.0, 0.1, 1.0, 10.0]

output:
  save_dir: "checkpoints"
  results_path: "results.json"
