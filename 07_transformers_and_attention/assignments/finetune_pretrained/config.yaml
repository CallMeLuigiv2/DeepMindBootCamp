# Fine-Tune Pretrained Transformer - Configuration

# Model
model:
  model_name: "bert-base-uncased"
  num_labels: 2
  max_length: 128

# Dataset
data:
  dataset_name: "glue"
  dataset_config: "sst2"
  # Alternative: dataset_name: "imdb", max_length: 512

# Fine-tuning
finetune:
  num_epochs: 3
  batch_size: 16
  bert_lr: 2.0e-5
  classifier_lr: 1.0e-3
  weight_decay: 0.01
  warmup_fraction: 0.1
  grad_clip_max_norm: 1.0
  seed: 42

# From-scratch comparison
from_scratch:
  d_model: 128
  num_heads: 4
  num_layers: 2
  d_ff: 256
  max_len: 512
  dropout: 0.1
  num_epochs: 50
  batch_size: 32
  learning_rate: 0.001
  data_sizes: [100, 500, 1000, 5000, -1]  # -1 means full dataset

# GPT-2 generation
generation:
  model_name: "gpt2"
  max_new_tokens: 100
  prompt: "The meaning of life is"
  temperatures: [0.5, 0.7, 1.0, 1.5, 2.0]
  top_k_values: [5, 10, 50, 100]
  top_p_values: [0.8, 0.9, 0.95]

# Logging
logging:
  log_interval: 50
  save_dir: checkpoints
  log_dir: logs
