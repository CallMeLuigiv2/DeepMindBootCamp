# End-to-End Optimization - Configuration

# Data
data:
  dataset: ag_news          # ag_news, imdb, or sst2
  max_seq_length: 256
  vocab_size: 30000
  pre_tokenize: true
  num_workers: 4
  pin_memory: true
  persistent_workers: true

# Model (Transformer encoder)
model:
  embedding_dim: 256
  num_heads: 8
  num_layers: 6
  ffn_hidden_dim: 1024
  max_seq_length: 256
  vocab_size: 30000
  num_classes: 4            # AG News has 4 classes
  dropout: 0.1
  pooling: mean             # mean or cls

# Baseline (deliberately unoptimized)
baseline:
  batch_size: 16
  num_workers: 0
  pin_memory: false
  mixed_precision: false
  compile: false
  flash_attention: false
  gradient_checkpointing: false
  gradient_accumulation_steps: 1

# Optimized
optimized:
  batch_size: 128           # Largest that fits with all optimizations
  num_workers: 4
  pin_memory: true
  mixed_precision: true
  mp_dtype: bfloat16        # bfloat16 or float16
  compile: true
  compile_mode: default     # default, reduce-overhead, max-autotune
  flash_attention: true
  gradient_checkpointing: true
  gradient_accumulation_steps: 4

# Training
training:
  num_epochs: 10
  learning_rate: 0.001
  optimizer: adamw
  weight_decay: 0.01
  lr_scheduler: cosine
  warmup_steps: 500

# Benchmark
benchmark:
  num_steps: 100
  warmup_steps: 20

# Logging
logging:
  save_dir: checkpoints
  log_dir: logs
